<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      title / description / canonical / og:* / twitter:* are set per-page via
      react-helmet-async (see src/pages/*.tsx). Helmet only ever adds tags, it
      never removes ones already in this static file, so duplicating them
      here would leave two conflicting og:title etc. in the rendered output -
      crawlers take the first one, silently breaking the per-page overrides.
    -->
    <meta
      name="keywords"
      content="Benargy Engineering Solutions, Benargy, Benergy, Adegbite Mayowa, engineering company Nigeria, electrical services Nigeria, electrical installation Nigeria, solar panel installation Nigeria, solar installation Lagos, solar installation Abuja, solar installer Port Harcourt, inverter installation Nigeria, renewable energy company Nigeria, national grid Nigeria, transmission line Nigeria, Nigeria electricity, NEPA, security camera installation Lagos, CCTV installer Abuja, smart home automation Nigeria, electrical wiring services Nigeria, Lagos"
    />
    <meta name="author" content="Benargy Engineering Solutions" />
    <meta name="robots" content="index, follow" />

    <!-- Structured Data / LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Benargy Engineering Solutions",
        "image": "https://benargy.com/logo.png",
        "url": "https://benargy.com/",
        "telephone": ["+2348091167852", "+2349031257244"],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "24, Olusoji Imole Street, Mile 12",
          "addressLocality": "Lagos",
          "addressCountry": "NG"
        },
        "areaServed": ["Lagos", "Abuja", "Port Harcourt", "Nigeria"],
        "sameAs": [
          "https://www.instagram.com/benargy_es",
          "https://www.tiktok.com/@benargy"
        ],
        "description": "Benargy Engineering Solutions delivers solar and inverter installation, security camera and surveillance, smart home automation, and electrical installation services across Nigeria."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
